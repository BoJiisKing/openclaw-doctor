<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Harbor Demo</title>
  <style>
    :root {
      --bg: #eef4f7;
      --bg-soft: #f7fbfc;
      --panel: rgba(255,255,255,.78);
      --line: rgba(148, 163, 184, .22);
      --text: #1f2937;
      --muted: #667085;
      --primary: #315c72;
      --primary-soft: #dcecf2;
      --green: #2f7d67;
      --orange: #b7791f;
      --red: #b04747;
      --shadow: 0 18px 40px rgba(50, 79, 92, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(173, 216, 230, .35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(196, 224, 229, .4), transparent 32%),
        linear-gradient(180deg, #edf4f7 0%, #f7fbfc 100%);
    }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 28px 20px 56px; }
    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(243,248,250,.92));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .hero h1 { margin: 0 0 10px; font-size: 34px; letter-spacing: .02em; }
    .hero p { margin: 0; color: var(--muted); max-width: 760px; line-height: 1.8; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .grid { display: grid; grid-template-columns: 1.25fr 1fr; gap: 16px; align-items: start; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    h1,h2,h3 { margin: 0 0 12px; }
    h2 { font-size: 22px; }
    .tag { display: inline-block; padding: 6px 12px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); margin-right: 8px; margin-bottom: 8px; font-size: 13px; }
    .risk-low { color: var(--green); }
    .risk-medium { color: var(--orange); }
    .risk-high { color: var(--red); }
    ul { padding-left: 20px; line-height: 1.8; }
    .muted { color: var(--muted); }
    label { display: block; font-size: 14px; margin-bottom: 10px; color: #334155; }
    input, select, textarea, button { width: 100%; padding: 11px 12px; border-radius: 14px; border: 1px solid rgba(148,163,184,.28); font: inherit; background: rgba(255,255,255,.92); }
    textarea { min-height: 88px; resize: vertical; }
    button { background: linear-gradient(135deg, #315c72, #46758b); color: white; border: none; cursor: pointer; box-shadow: 0 10px 24px rgba(49,92,114,.18); }
    button.secondary { background: #e8eef1; color: #22313f; box-shadow: none; }
    button.danger { background: linear-gradient(135deg, #b04747, #c05f5f); }
    button.warn { background: linear-gradient(135deg, #b7791f, #cf9334); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .small { font-size: 13px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 6px; border-bottom: 1px solid rgba(148,163,184,.16); font-size: 14px; vertical-align: top; }
    .pill { display: inline-block; padding: 3px 10px; background: #edf5f7; border-radius: 999px; font-size: 12px; color: var(--primary); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    a.linkbtn { display: inline-block; text-decoration: none; background: #eef5f7; color: #315c72; padding: 9px 13px; border-radius: 12px; border: 1px solid rgba(148,163,184,.18); }
    .chart { display: flex; align-items: end; gap: 8px; height: 120px; margin-top: 8px; }
    .barwrap { flex: 1; min-width: 0; }
    .bar { width: 100%; border-radius: 10px 10px 0 0; background: #7aa6bc; }
    .bar.sleep { background: #92bfae; }
    .bar.anxiety { background: #d3a45d; }
    .chartlabel { text-align: center; font-size: 12px; color: var(--muted); margin-top: 6px; }
    .editorial { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
    .story { background: rgba(255,255,255,.62); border:1px solid var(--line); border-radius:20px; padding:16px; min-height:170px; }
    .story small { color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; display:block; margin-bottom:10px; }
    .story h3 { font-size: 22px; line-height: 1.3; }
    .story p { color: var(--muted); line-height: 1.75; }
    @media (max-width: 900px) { .editorial { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Mind Harbor / 心港</h1>
      <p>一个面向精神障碍康复支持场景的安全优先型辅助系统原型。它的目标不是替代医生，而是在混乱的时候给人一点结构、一点节律、和一点现实可执行的下一步。</p>
      <div style="margin-top:16px;">
        <span class="tag">状态追踪</span>
        <span class="tag">服药提醒</span>
        <span class="tag">危机支持</span>
        <span class="tag">复诊摘要</span>
        <span class="tag">本地 JSON 存储</span>
        <span class="tag">趋势统计</span>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card" id="dashboard"></div>
        <div class="card" id="settingsSummary"></div>
        <div class="card" id="focusMode"></div>
        <div class="card" id="dailyInsight"></div>
        <div class="card" id="editorialFeed"></div>
        <div class="card" id="recoverySignals"></div>
        <div class="card" id="recommendedResources"></div>
        <div class="card" id="trends"></div>
        <div class="card">
          <div class="actions" style="margin-bottom:12px;">
            <button class="secondary" id="downloadSummary">导出复诊摘要</button>
            <a class="linkbtn" href="/crisis">打开危机支持页</a>
            <a class="linkbtn" href="/settings">设置</a>
            <a class="linkbtn" href="/resources">知识与求助资源</a>
          </div>
          <h2>最近记录</h2>
          <div id="history"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>每日打卡</h2>
          <form id="checkinForm">
            <input type="hidden" name="editingId" value="">
            <label>模式
              <select name="mode">
                <option value="depression">抑郁</option>
                <option value="anxiety">焦虑</option>
                <option value="bipolar">双相</option>
              </select>
            </label>
            <div class="row">
              <label>心情（0-10）<input name="mood" type="number" min="0" max="10" value="5"></label>
              <label>焦虑（0-10）<input name="anxiety" type="number" min="0" max="10" value="5"></label>
            </div>
            <div class="row">
              <label>精力（0-10）<input name="energy" type="number" min="0" max="10" value="5"></label>
              <label>睡眠小时数<input name="sleepHours" type="number" min="0" max="24" value="7"></label>
            </div>
            <div class="row">
              <label>食欲（0-10）<input name="appetite" type="number" min="0" max="10" value="5"></label>
              <label>近 7 天漏药次数<input name="medicationMisses7d" type="number" min="0" max="30" value="0"></label>
            </div>
            <div class="row">
              <label>冲动程度（0-10）<input name="impulsivity" type="number" min="0" max="10" value="0"></label>
              <label>情绪高涨（0-10）<input name="elevatedMood" type="number" min="0" max="10" value="0"></label>
            </div>
            <label>自伤想法
              <select name="selfHarmThoughts">
                <option value="none">无</option>
                <option value="passive">有被动想法</option>
                <option value="active">有主动风险</option>
              </select>
            </label>
            <label>备注
              <textarea name="notes" placeholder="今天发生了什么？有没有明显触发点、副作用、难受的时段？"></textarea>
            </label>
            <div class="actions">
              <button type="submit">保存今日打卡</button>
              <button type="button" class="secondary" onclick="resetCheckinForm()">清空</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>添加药物</h2>
          <form id="medForm">
            <input type="hidden" name="editingId" value="">
            <label>药物名称<input name="name" placeholder="如：舍曲林 / 喹硫平 / 示例药物"></label>
            <label>服用时间（逗号分隔）<input name="schedule" placeholder="08:00, 21:00"></label>
            <label>备注<textarea name="notes" placeholder="如：遵医嘱服用、饭后、睡前等"></textarea></label>
            <div class="actions">
              <button type="submit">保存药物</button>
              <button type="button" class="secondary" onclick="resetMedForm()">清空</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    let latestHistory = [];
    let latestMeds = [];

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      return res.json();
    }

    function esc(text) {
      return String(text ?? '').replace(/[&<>\"]/g, s => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[s]));
    }

    function setForm(form, data) {
      Object.entries(data).forEach(([k,v]) => {
        if (form.elements[k]) form.elements[k].value = Array.isArray(v) ? v.join(', ') : v;
      });
    }

    function resetCheckinForm() {
      document.getElementById('checkinForm').reset();
      document.querySelector('#checkinForm [name="editingId"]').value = '';
    }

    function resetMedForm() {
      document.getElementById('medForm').reset();
      document.querySelector('#medForm [name="editingId"]').value = '';
    }

    async function loadDashboard() {
      const data = await fetchJson('/api/dashboard');
      const defaultMode = data.settings?.defaultMode || data.userMode || 'depression';
      const modeInput = document.querySelector('#checkinForm [name="mode"]');
      if (modeInput && !document.querySelector('#checkinForm [name="editingId"]').value) modeInput.value = defaultMode;
      latestMeds = data.medications || [];
      const riskCls = `risk-${data.risk.riskLevel}`;
      const crisisLink = data.risk.riskLevel === 'high' ? '<p><a class="linkbtn" href="/crisis">立即查看危机支持</a></p>' : '';
      document.getElementById('dashboard').innerHTML = `
        <h2>${esc(data.modeTitle || '支持模式')}</h2>
        <p>${esc(data.modeIntro || '')}</p>
        <div class="card" style="padding:12px; background:#f8fafc; box-shadow:none; margin-top:12px;">
          <strong>${esc(data.statusCard.title)}</strong>
          <p class="small muted" style="margin:8px 0 0;">${esc(data.statusCard.body)}</p>
        </div>
        <p><strong>当前风险等级：</strong><span class="${riskCls}">${esc(data.risk.riskLevel)}</span></p>
        <p><strong>触发标记：</strong>${data.risk.flags.length ? data.risk.flags.map(esc).join('、') : '无'}</p>
        <p>${esc(data.crisisMessage)}</p>
        ${crisisLink}

        <h3>支持建议</h3>
        <p>${esc(data.support.message)}</p>
        <ul>${data.support.actions.map(x => `<li>${esc(x)}</li>`).join('')}</ul>

        <h3>药物</h3>
        <ul>${data.medications.map(m => `<li>${esc(m.name)}：${esc((m.schedule || []).join(', '))}（${esc(m.notes || '')}） <button class="warn small" onclick="editMedication('${esc(m.id)}')">编辑</button> <button class="danger small" onclick="deleteMedication('${esc(m.id)}')">删除</button></li>`).join('')}</ul>

        <h3>复诊摘要</h3>
        <ul>
          <li>平均心情：${esc(data.summary.averageMood)}</li>
          <li>平均睡眠：${esc(data.summary.averageSleepHours)} 小时</li>
          <li>记录到的漏服次数：${esc(data.summary.medicationMissesReported)}</li>
          <li>有自伤想法的记录天数：${esc(data.summary.daysWithSelfHarmThoughts)}</li>
        </ul>
        <p class="small muted">${esc(data.summary.clinicianPrompt)}</p>
      `;

      document.getElementById('settingsSummary').innerHTML = `
        <h2>当前设置摘要</h2>
        <p><strong>默认模式：</strong>${esc(data.settings.defaultMode || data.userMode)}</p>
        <p><strong>提醒时间：</strong>${esc((data.settings.reminderTimes || []).join(', ') || '未设置')}</p>
        <p><strong>紧急联系人：</strong>${esc(data.settings.emergencyContact || '未设置')}</p>
      `;

      document.getElementById('focusMode').innerHTML = data.focusMode?.enabled ? `
        <h2>${esc(data.focusMode.title)}</h2>
        <p>${esc(data.focusMode.body)}</p>
        <ul>${(data.focusMode.actions || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      ` : '';

      document.getElementById('dailyInsight').innerHTML = `
        <h2>${esc(data.dailyInsight.title)}</h2>
        <p>${esc(data.dailyInsight.body)}</p>
      `;

      document.getElementById('editorialFeed').innerHTML = `
        <h2>今日陪伴与阅读</h2>
        <div class="editorial">${(data.editorialCards || []).map(card => `
          <article class="story">
            <small>${esc(card.eyebrow)}</small>
            <h3>${esc(card.title)}</h3>
            <p>${esc(card.body)}</p>
          </article>
        `).join('')}</div>
      `;

      document.getElementById('recoverySignals').innerHTML = `
        <h2>${esc(data.recoverySignals.title)}</h2>
        <ul>${(data.recoverySignals.items || []).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      `;

      document.getElementById('recommendedResources').innerHTML = `
        <h2>根据当前状态推荐阅读</h2>
        <ul>${(data.recommendedResources || []).map(item => `<li><a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.title)}</a>：${esc(item.reason)}</li>`).join('')}</ul>
      `;

      const bars = data.trends.labels.map((label, i) => `
        <div class="barwrap">
          <div class="bar" style="height:${(data.trends.mood[i] || 0) * 10}px" title="心情 ${data.trends.mood[i] || 0}"></div>
          <div class="bar anxiety" style="height:${(data.trends.anxiety[i] || 0) * 10}px" title="焦虑 ${data.trends.anxiety[i] || 0}"></div>
          <div class="bar sleep" style="height:${Math.min((data.trends.sleep[i] || 0) * 10, 100)}px" title="睡眠 ${data.trends.sleep[i] || 0}"></div>
          <div class="chartlabel">${esc(label)}</div>
        </div>
      `).join('');
      document.getElementById('trends').innerHTML = `
        <h2>近 7 条趋势</h2>
        <p class="muted small">蓝色=心情，橙色=焦虑，绿色=睡眠时长</p>
        <div class="chart">${bars || '<p class="muted">暂无趋势数据</p>'}</div>
      `;
    }

    async function loadHistory() {
      const items = await fetchJson('/api/history');
      latestHistory = items;
      if (!items.length) {
        document.getElementById('history').innerHTML = '<p class="muted">还没有历史记录。</p>';
        return;
      }
      document.getElementById('history').innerHTML = `
        <table>
          <thead>
            <tr><th>时间</th><th>模式</th><th>心情</th><th>焦虑</th><th>睡眠</th><th>风险线索</th><th>备注</th><th>操作</th></tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${esc(new Date(item.createdAt).toLocaleString('zh-CN'))}</td>
                <td><span class="pill">${esc(item.mode)}</span></td>
                <td>${esc(item.mood)}</td>
                <td>${esc(item.anxiety)}</td>
                <td>${esc(item.sleepHours)}</td>
                <td>${esc(item.selfHarmThoughts)}</td>
                <td>${esc(item.notes || '')}</td>
                <td><button class="warn small" onclick="editCheckin('${esc(item.id)}')">编辑</button> <button class="danger small" onclick="deleteCheckin('${esc(item.id)}')">删除</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function editCheckin(id) {
      const item = latestHistory.find(v => v.id === id);
      if (!item) return;
      const form = document.getElementById('checkinForm');
      setForm(form, item);
      form.elements.editingId.value = id;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function editMedication(id) {
      const item = latestMeds.find(v => v.id === id);
      if (!item) return;
      const form = document.getElementById('medForm');
      setForm(form, item);
      form.elements.editingId.value = id;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteCheckin(id) {
      await fetch(`/api/checkins/${id}`, { method: 'DELETE' });
      await loadDashboard();
      await loadHistory();
    }

    async function deleteMedication(id) {
      await fetch(`/api/medications/${id}`, { method: 'DELETE' });
      await loadDashboard();
    }

    document.getElementById('checkinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      const editingId = body.editingId;
      delete body.editingId;
      if (editingId) {
        await fetchJson(`/api/checkins/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      } else {
        await fetchJson('/api/checkins', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      }
      resetCheckinForm();
      await loadDashboard();
      await loadHistory();
    });

    document.getElementById('medForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      const editingId = body.editingId;
      delete body.editingId;
      if (editingId) {
        await fetchJson(`/api/medications/${editingId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      } else {
        await fetchJson('/api/medications', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      }
      resetMedForm();
      await loadDashboard();
    });

    document.getElementById('downloadSummary').addEventListener('click', async () => {
      const text = await fetch('/api/summary.txt').then(r => r.text());
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'visit-summary.txt';
      a.click();
      URL.revokeObjectURL(url);
    });

    loadDashboard();
    loadHistory();
    window.deleteCheckin = deleteCheckin;
    window.deleteMedication = deleteMedication;
    window.editCheckin = editCheckin;
    window.editMedication = editMedication;
    window.resetCheckinForm = resetCheckinForm;
    window.resetMedForm = resetMedForm;
  </script>
</body>
</html>
