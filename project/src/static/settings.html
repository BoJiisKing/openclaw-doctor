<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置 - Mind Harbor</title>
  <style>
    :root {
      --bg: #eef4f7;
      --panel: rgba(255,255,255,.8);
      --line: rgba(148,163,184,.22);
      --text: #1f2937;
      --muted: #667085;
      --primary: #315c72;
      --shadow: 0 18px 40px rgba(50,79,92,.08);
    }
    body {
      font-family: Georgia, 'Noto Serif SC', 'Source Han Serif SC', serif;
      margin: 0;
      background: linear-gradient(180deg, #edf4f7 0%, #f8fbfc 100%);
      color: var(--text);
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 56px; }
    .card { background: var(--panel); border:1px solid var(--line); border-radius: 24px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); backdrop-filter: blur(12px); }
    h1,h2 { margin: 0 0 12px; }
    .muted { color: var(--muted); }
    label { display:block; margin-bottom: 12px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; padding: 11px 12px; border-radius: 14px; border: 1px solid rgba(148,163,184,.28); font: inherit; background: rgba(255,255,255,.92); }
    .actions { display:flex; gap: 10px; flex-wrap: wrap; }
    button { background:linear-gradient(135deg, #315c72, #46758b); color:#fff; border:none; cursor:pointer; }
    button.secondary { background:#e5e7eb; color:#111827; }
    button.danger { background:linear-gradient(135deg, #b04747, #c05f5f); }
    a { color: var(--primary); text-decoration: none; }
    pre { background:#16303f; color:#e2e8f0; padding:12px; border-radius:16px; overflow:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>设置</h1>
      <p class="muted">这里可以保存默认模式、提醒时间和紧急联系人。后续会继续扩展。</p>
      <p><a href="/">返回首页</a></p>
    </div>

    <div class="card">
      <h2>基本设置</h2>
      <form id="settingsForm">
        <label>默认模式
          <select name="defaultMode">
            <option value="depression">抑郁</option>
            <option value="anxiety">焦虑</option>
            <option value="bipolar">双相</option>
          </select>
        </label>
        <label>提醒时间（逗号分隔）
          <input name="reminderTimes" placeholder="08:00, 21:00">
        </label>
        <label>紧急联系人
          <input name="emergencyContact" placeholder="姓名 / 电话 / 关系">
        </label>
        <div class="actions">
          <button type="submit">保存设置</button>
          <button type="button" class="secondary" id="exportData">导出全部数据</button>
          <button type="button" class="danger" id="resetData">重置全部数据</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>当前设置</h2>
      <pre id="settingsPreview">加载中...</pre>
    </div>
  </div>

  <script>
    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      return res.json();
    }

    async function loadSettings() {
      const data = await fetchJson('/api/settings');
      document.getElementById('settingsPreview').textContent = JSON.stringify(data, null, 2);
      const form = document.getElementById('settingsForm');
      form.elements.defaultMode.value = data.defaultMode || 'depression';
      form.elements.reminderTimes.value = Array.isArray(data.reminderTimes) ? data.reminderTimes.join(', ') : (data.reminderTimes || '');
      form.elements.emergencyContact.value = data.emergencyContact || '';
    }

    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      await fetchJson('/api/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      await loadSettings();
    });

    document.getElementById('exportData').addEventListener('click', async () => {
      const text = await fetch('/api/export').then(r => r.text());
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mind-harbor-data.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('resetData').addEventListener('click', async () => {
      if (!confirm('确定要重置全部本地数据吗？')) return;
      await fetchJson('/api/reset', { method: 'POST' });
      await loadSettings();
      alert('已重置。');
    });

    loadSettings();
  </script>
</body>
</html>
