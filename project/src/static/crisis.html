<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>危机支持 - Mind Harbor</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #fff7f7; color: #1f2937; margin: 0; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px; }
    .card { background: white; border: 1px solid #fecaca; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    h1,h2 { margin: 0 0 12px; }
    ul { padding-left: 20px; }
    .danger { color: #b91c1c; font-weight: 700; }
    a.button { display: inline-block; background: #b91c1c; color: white; text-decoration: none; padding: 10px 14px; border-radius: 10px; margin-right: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>危机支持</h1>
      <p class="danger">如果你现在有明确的自伤/自杀/伤人计划，或已经觉得自己无法保证安全，请不要只停留在网页上。</p>
      <p>请立刻联系当地急救、危机热线、主治医生、家属或你信任的人，并尽量不要独处。</p>
      <a class="button" href="/">返回首页</a>
    </div>
    <div class="card">
      <h2>马上做这几件事</h2>
      <ul>
        <li>去有人的地方，不要独处</li>
        <li>把可能伤害自己的物品移开</li>
        <li>给一个可信任的人发消息或打电话</li>
        <li>如果风险很高，直接联系当地急救/医院</li>
      </ul>
    </div>
    <div class="card">
      <h2>提醒</h2>
      <p>Mind Harbor 是康复支持工具，不替代急救、医生或线下照护。</p>
    </div>
  </div>
</body>
</html>
